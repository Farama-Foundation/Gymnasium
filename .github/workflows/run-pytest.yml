name: Run PyTest
on: [pull_request, push]

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  build-all:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        numpy-version: ['>=1.21,<2.0', '>=2.1']
        # numpy < 2.0 has no wheels for Python >= 3.13 (1.26.4 tops out at cp312), so only
        # the numpy >= 2.1 line is testable there.
        exclude:
          - python-version: '3.13'
            numpy-version: '>=1.21,<2.0'
          - python-version: '3.14'
            numpy-version: '>=1.21,<2.0'
    steps:
      - uses: actions/checkout@v7
      - run: |
          docker build -f bin/all-py.Dockerfile \
            --build-arg PYTHON_VERSION="${{ matrix.python-version }}" \
            --build-arg NUMPY_VERSION="${{ matrix.numpy-version }}" \
            --tag gymnasium-all-docker .
      - name: Run tests
        run: docker run gymnasium-all-docker pytest tests/*
      - name: Run doctests
        # box2d has no Python 3.14 wheel, so it is not installed there and its modules raise on
        # import; skip its doctests on 3.14 (its unit tests are skipped via a marker).
        run: |
          docker run gymnasium-all-docker pytest --doctest-modules gymnasium/ \
            ${{ matrix.python-version == '3.14' && '--ignore=gymnasium/envs/box2d' || '' }}

  build-necessary:
    runs-on:
      ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: |
           docker build -f bin/necessary-py.Dockerfile \
             --build-arg PYTHON_VERSION='3.10' \
             --tag gymnasium-necessary-docker .
      - name: Run tests
        run: |
           docker run gymnasium-necessary-docker pytest tests/test_core.py tests/envs/test_envs.py tests/spaces
