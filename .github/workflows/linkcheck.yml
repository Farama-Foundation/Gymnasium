name: Check documentation links

on:
  schedule:
    # 00:00 UTC on the 1st and 15th of every month (~every two weeks)
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linkcheck:
    name: Sphinx linkcheck
    runs-on: ubuntu-latest
    env:
      SPHINX_GITHUB_CHANGELOG_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Install Gymnasium
        run: pip install .[box2d,mujoco,jax] torch matplotlib

      - name: Build Envs Docs
        run: python docs/_scripts/gen_mds.py && python docs/_scripts/gen_envs_display.py

      - name: Check links
        run: python docs/_scripts/linkcheck.py -v

      - name: Upload linkcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linkcheck-report
          path: _build/linkcheck/